[package]
edition = "2021"
rust-version = "1.65.0"
name = "ratatui"
version = "0.21.0"
authors = ["Florian Dehau <work@fdehau.com>"]
exclude = [
    "assets/*",
    ".github",
    "Makefile.toml",
    "CONTRIBUTING.md",
    "*.log",
    "tags",
]
autoexamples = true
description = """
A library to build rich terminal user interfaces or dashboards
"""
documentation = "https://docs.rs/ratatui/latest/ratatui/"
readme = "README.md"
keywords = [
    "tui",
    "terminal",
    "dashboard",
]
license = "MIT"
repository = "https://github.com/tui-rs-revival/ratatui"

